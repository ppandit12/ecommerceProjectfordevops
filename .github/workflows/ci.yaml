# CI for Product Catalog Service

name: product-catalog-ci

permissions:
  contents: write

on: 
    push:
        branches:
        - main
    pull_request:
        branches:
        - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: Setup Go 1.22
          uses: actions/setup-go@v2
          with:
            go-version: 1.22
        
        - name: Build
          run: |
            cd src/product-catalog
            go mod download
            go build -o product-catalog-service main.go

        - name: unit tests
          run: |
            cd src/product-catalog
            go test ./...
    
    code-quality:
        runs-on: ubuntu-latest

        steps:
        - name: checkout code
          uses: actions/checkout@v4
        
        - name: Setup Go 1.22
          uses: actions/setup-go@v2
          with:
           go-version: 1.22
        
        - name: Run golangci-lint
          uses: golangci/golangci-lint-action@v6
          with:
            version: v1.55.2
            run: golangci-lint run
            working-directory: src/product-catalog

    docker:
        runs-on: ubuntu-latest

        needs: build

        steps:
        - name: checkout code
          uses: actions/checkout@v4

        - name: Install Docker
          uses: docker/setup-buildx-action@v1
        
        - name: Login to Docker
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_TOKEN }}

        - name: Docker Push Product Catalog
          uses: docker/build-push-action@v6
          with:
            context: src/product-catalog
            file: src/product-catalog/Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}/product-catalog:${{github.run_id}}

        - name: Docker Push Frontend
          uses: docker/build-push-action@v6
          with:
            context: .
            file: src/frontend/Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}/frontend:${{github.run_id}}

    
    updatek8s:
        runs-on: ubuntu-latest

        needs: docker

        steps:
        - name: checkout code
          uses: actions/checkout@v4
          with:
            token: ${{ secrets.GITHUB_TOKEN }}

        - name: Update tag in kubernetes deployment manifest
          run: | 
               sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}/product-catalog:${{github.run_id}}|" kubernetes/productcatalog/deploy.yaml
               
               # Update frontend image tags
               sed -i "s|image: 'ghcr.io/open-telemetry/demo:1.12.0-frontend'|image: '${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}/frontend:${{github.run_id}}'|g" kubernetes/frontend/deploy.yaml
               sed -i "s|image: '.*frontend:.*'|image: '${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}/frontend:${{github.run_id}}'|g" kubernetes/frontend/deploy.yaml
               
               sed -i "s|image: 'ghcr.io/open-telemetry/demo:1.12.0-frontend'|image: '${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}/frontend:${{github.run_id}}'|g" kubernetes/complete-deploy.yaml
               sed -i "s|image: '.*frontend:.*'|image: '${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}/frontend:${{github.run_id}}'|g" kubernetes/complete-deploy.yaml
        
        - name: Commit and push changes
          run: |
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config --global user.name "github-actions[bot]"
            git add kubernetes/productcatalog/deploy.yaml kubernetes/frontend/deploy.yaml kubernetes/complete-deploy.yaml
            git commit -m "[CI]: Update product catalog and frontend image tags [skip ci]"
            git push origin HEAD:main

    deploy:
        runs-on: ubuntu-latest
        needs: updatek8s
        steps:
        - name: Checkout Code
          uses: actions/checkout@v4
          with:
            ref: main # Ensure we pull the latest commit containing the bot's manifest updates

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: us-east-1

        - name: Deploy to EKS
          run: |
            aws eks update-kubeconfig --region us-east-1 --name otel-eks-cluster
            kubectl apply -f kubernetes/complete-deploy.yaml

        
        
          


        